<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Infinite Spinner</title></head>
<body>
  <main>
    <h1>Loading</h1>
    <p id="ticker" aria-live="polite">Tick 0</p>
  </main>
  <script>
    let n = 0;
    setInterval(() => {
      n += 1;
      document.getElementById('ticker').textContent = 'Tick ' + n;
    }, 100);
  </script>
</body>
</html>
